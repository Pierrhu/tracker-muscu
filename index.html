<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0C0C10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Tracker Muscu">
<link rel="manifest" href="manifest.json">
<title>Tracker Muscu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0C0C10;
    --card: #101014;
    --card2: #16161E;
    --border: #1C1C28;
    --text: #DDDDE0;
    --text2: #888;
    --text3: #555;
    --red: #C23B3B;
    --blue: #2D7DD2;
    --green: #1A9E8F;
    --yellow: #E4A229;
    --purple: #8B5CF6;
    --cyan: #06B6D4;
  }

  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
    padding-bottom: 72px;
  }

  /* TOAST */
  .toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-100px);
    background: var(--green); color: #000; padding: 10px 28px; border-radius: 12px;
    font-size: 13px; font-weight: 700; z-index: 999; transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.pr { background: var(--yellow); }

  /* PR BANNER */
  .pr-banner {
    background: linear-gradient(135deg, rgba(228,162,41,0.12), rgba(194,59,59,0.08));
    border: 1px solid rgba(228,162,41,0.3); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
  }
  .pr-banner .pr-icon { font-size: 20px; }
  .pr-banner .pr-text { font-size: 12px; color: var(--yellow); font-weight: 700; }
  .pr-banner .pr-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* SUGGESTION */
  .suggestion-tag {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 4px; background: rgba(26,158,143,0.15); color: var(--green);
    margin-left: 6px; vertical-align: middle;
  }

  /* STREAK */
  .streak-banner {
    background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(6,182,212,0.08));
    border: 1px solid rgba(139,92,246,0.25); border-radius: 12px;
    padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px;
  }
  .streak-num { font-size: 32px; font-weight: 800; color: var(--purple); line-height: 1; }
  .streak-label { font-size: 13px; font-weight: 700; color: var(--text); }
  .streak-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* NAV */
  .nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; display: flex; justify-content: space-around;
    padding: 6px 0 max(10px, env(safe-area-inset-bottom));
    background: var(--bg);
    border-top: 1px solid var(--border); z-index: 100;
  }
  .nav button {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: none; border: none; color: var(--text3); cursor: pointer;
    padding: 4px 10px; font-family: inherit; transition: color 0.15s;
  }
  .nav button.active { color: #fff; }
  .nav button span.icon { font-size: 20px; line-height: 1; }
  .nav button span.icon img { width: 22px; height: 22px; opacity: 0.35; transition: opacity 0.15s; }
  .nav button.active span.icon img { opacity: 1; }
  .nav button span.label { font-size: 9px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

  /* PAGE */
  .page { padding: 16px 14px; display: none; }
  .page.active { display: block; }
  .page-title { font-size: 18px; font-weight: 800; color: #EDEDF0; margin-bottom: 14px; letter-spacing: -0.3px; }

  /* CARDS */
  .card {
    background: var(--card); border-radius: 10px; padding: 12px 14px;
    border: 1px solid var(--border); margin-bottom: 6px;
  }

  /* DAY SELECTOR */
  .day-sel { display: flex; gap: 6px; margin-bottom: 14px; }
  .day-btn {
    flex: 1; padding: 12px 4px; border: 1.5px solid var(--border); border-radius: 10px;
    cursor: pointer; text-align: center; background: var(--card); font-family: inherit; transition: 0.15s;
  }
  .day-btn.active { background: var(--active-color); border-color: var(--active-accent); }
  .day-btn .day-name { font-size: 14px; font-weight: 700; color: var(--text3); }
  .day-btn.active .day-name { color: var(--active-accent); }
  .day-btn .day-when { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* EXERCISE */
  .ex-card { cursor: pointer; transition: border-color 0.15s; }
  .ex-card.open { border-color: var(--ex-accent, var(--border)); }
  .ex-header { display: flex; justify-content: space-between; align-items: center; }
  .ex-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .ex-format { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .ex-prev { font-size: 11px; color: var(--text3); text-align: right; }
  .ex-prev strong { font-weight: 600; }
  .ex-arrow { font-size: 16px; color: var(--text3); transition: 0.15s; }
  .ex-card.open .ex-arrow { color: var(--ex-accent); }

  .tag {
    display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 6px;
    border-radius: 4px; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .tag-top { background: rgba(194,59,59,0.15); color: var(--red); }
  .tag-ss { background: rgba(139,92,246,0.15); color: var(--purple); }
  .tag-drop { background: rgba(228,162,41,0.15); color: var(--yellow); }

  .sets-area { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .set-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .set-label { width: 56px; font-size: 11px; font-weight: 600; color: var(--text3); }
  .set-label.top { color: var(--red); }
  .input-wrap { position: relative; flex: 1; }
  .input-wrap input {
    width: 100%; padding: 9px 30px 9px 10px; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px; font-weight: 600; outline: none;
    font-family: inherit; -webkit-appearance: none; -moz-appearance: textfield;
  }
  .input-wrap input:focus { border-color: var(--ex-accent, var(--blue)); }
  .input-wrap input::placeholder { color: #333; }
  .input-wrap .unit {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 10px; color: #444; pointer-events: none;
  }

  /* PRIMARY BTN */
  .btn-primary {
    width: 100%; padding: 14px; border: none; border-radius: 10px; color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    margin-top: 12px; letter-spacing: 0.3px; transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.8; }

  .btn-outline {
    width: 100%; padding: 12px; border: 1px solid rgba(194,59,59,0.3); border-radius: 10px;
    background: transparent; color: var(--red); font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; margin-top: 16px;
  }

  /* RANK SYSTEM */
  .rank-card {
    background: var(--card); border-radius: 14px; padding: 16px;
    border: 1px solid var(--border); margin-bottom: 10px; position: relative; overflow: hidden;
  }
  .rank-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .rank-badge {
    display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px;
    border-radius: 20px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
  }
  .rank-bar-bg {
    height: 8px; border-radius: 4px; background: var(--bg); margin: 10px 0 6px; overflow: hidden;
  }
  .rank-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(.34,1.56,.64,1); }

  /* Rank colors */
  .rank-bronze { --rc: #CD7F32; }
  .rank-argent { --rc: #A8B4C0; }
  .rank-or { --rc: #FFD700; }
  .rank-platine { --rc: #7DD3FC; }
  .rank-diamant { --rc: #06B6D4; }
  .rank-ecarlate { --rc: #DC2626; }
  .rank-iridescent { --rc: #A78BFA; }
  .rank-top250 { --rc: #F59E0B; }

  .rank-bronze .rank-badge { background: rgba(205,127,50,0.15); color: #CD7F32; }
  .rank-argent .rank-badge { background: rgba(168,180,192,0.15); color: #A8B4C0; }
  .rank-or .rank-badge { background: rgba(255,215,0,0.12); color: #FFD700; }
  .rank-platine .rank-badge { background: rgba(125,211,252,0.12); color: #7DD3FC; }
  .rank-diamant .rank-badge { background: rgba(6,182,212,0.15); color: #06B6D4; }
  .rank-ecarlate .rank-badge { background: rgba(220,38,38,0.15); color: #DC2626; }
  .rank-iridescent .rank-badge { background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(6,182,212,0.2)); color: #A78BFA; }
  .rank-top250 .rank-badge { background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(220,38,38,0.2)); color: #F59E0B; }

  .rank-bronze .rank-bar-fill { background: linear-gradient(90deg, #CD7F32, #B8691E); }
  .rank-argent .rank-bar-fill { background: linear-gradient(90deg, #A8B4C0, #8A9BAD); }
  .rank-or .rank-bar-fill { background: linear-gradient(90deg, #FFD700, #F0C800); }
  .rank-platine .rank-bar-fill { background: linear-gradient(90deg, #7DD3FC, #38BDF8); }
  .rank-diamant .rank-bar-fill { background: linear-gradient(90deg, #06B6D4, #0891B2); }
  .rank-ecarlate .rank-bar-fill { background: linear-gradient(90deg, #DC2626, #B91C1C); }
  .rank-iridescent .rank-bar-fill { background: linear-gradient(90deg, #A78BFA, #06B6D4, #34D399); }
  .rank-top250 .rank-bar-fill { background: linear-gradient(90deg, #F59E0B, #DC2626, #A78BFA); }

  .rank-card::before { background: var(--rc); }

  .overall-rank {
    text-align: center; padding: 24px 16px; margin-bottom: 16px;
    background: var(--card); border-radius: 16px; border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .overall-rank::after {
    content: ''; position: absolute; inset: 0; border-radius: 16px;
    border: 2px solid var(--rc); opacity: 0.3;
  }
  .overall-rank .rank-icon { font-size: 48px; margin-bottom: 8px; }
  .overall-rank .rank-name { font-size: 24px; font-weight: 800; letter-spacing: 1px; }
  .overall-rank .rank-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* BODY STATS */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-field label { display: block; font-size: 10px; color: var(--text3); margin-bottom: 3px; }
  .stat-field input {
    width: 100%; padding: 8px 10px; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; font-weight: 600; outline: none;
    font-family: inherit; -webkit-appearance: none; -moz-appearance: textfield;
  }

  /* HISTORY */
  .hist-card { border-left: 3px solid var(--hist-accent); }
  .hist-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .hist-tag {
    font-size: 10px; padding: 3px 7px; border-radius: 5px;
    background: var(--card2); color: var(--text2);
  }

  /* CHART */
  .chart-container { position: relative; height: 80px; display: flex; align-items: flex-end; gap: 3px; margin: 8px 0; }
  .chart-bar {
    flex: 1; border-radius: 3px 3px 0 0; min-height: 4px; transition: height 0.4s;
    position: relative;
  }
  .chart-bar .chart-val {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: var(--text2); white-space: nowrap;
  }
  .chart-labels { display: flex; gap: 3px; }
  .chart-labels span { flex: 1; text-align: center; font-size: 8px; color: var(--text3); }

  .info-text { font-size: 12px; color: var(--text3); line-height: 1.6; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  .modal-overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-box {
    background: var(--card); border-radius: 20px 20px 0 0; padding: 20px 16px 32px;
    width: 100%; max-width: 480px; border-top: 1px solid var(--border);
    animation: slideUp 0.25s cubic-bezier(.34,1.56,.64,1);
    max-height: 88vh; overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title { font-size: 15px; font-weight: 800; margin-bottom: 16px; color: #EDEDF0; }
  .modal-cancel {
    width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px;
    background: transparent; color: var(--text2); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; margin-top: 8px;
  }

  /* HIST ACTION BUTTONS */
  .hist-actions { display: flex; gap: 6px; margin-top: 10px; }
  .hist-btn {
    flex: 1; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: 700;
    cursor: pointer; font-family: inherit; border: none;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .hist-btn-edit { background: rgba(45,125,210,0.15); color: var(--blue); }
  .hist-btn-del { background: rgba(194,59,59,0.12); color: var(--red); }

  /* EXPORT BTN */
  .btn-export {
    width: 100%; padding: 12px; border: 1px solid rgba(26,158,143,0.35); border-radius: 10px;
    background: rgba(26,158,143,0.08); color: var(--green); font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-bottom: 8px; margin-top: 0;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 0.2px;
  }
  .btn-export:active { opacity: 0.8; }

  /* IMPORT BTN */
  .btn-import {
    width: 100%; padding: 12px; border: 1px solid rgba(45,125,210,0.35); border-radius: 10px;
    background: rgba(45,125,210,0.08); color: var(--blue); font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-bottom: 8px; margin-top: 0;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 0.2px;
  }
  .btn-import:active { opacity: 0.8; }

  /* IMPORT MODAL */
  .import-drop-zone {
    border: 2px dashed rgba(45,125,210,0.4); border-radius: 12px;
    padding: 28px 16px; text-align: center; cursor: pointer;
    background: rgba(45,125,210,0.04); transition: 0.15s; margin-bottom: 12px;
  }
  .import-drop-zone.dragover {
    border-color: var(--blue); background: rgba(45,125,210,0.1);
  }
  .import-drop-zone .drop-icon { font-size: 32px; margin-bottom: 8px; }
  .import-drop-zone .drop-title { font-size: 14px; font-weight: 700; color: var(--blue); }
  .import-drop-zone .drop-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .import-preview { font-size: 12px; color: var(--text3); margin-bottom: 10px; line-height: 1.6; }
  .import-preview strong { color: var(--blue); font-weight: 700; }

  /* STREAK BANNER */
  .streak-banner {
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(135deg, rgba(228,162,41,0.15), rgba(194,59,59,0.1));
    border: 1px solid rgba(228,162,41,0.3); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .streak-num { font-size: 32px; font-weight: 800; color: var(--yellow); line-height: 1; min-width: 36px; }
  .streak-label { font-size: 13px; font-weight: 700; color: var(--yellow); }
  .streak-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* PR BANNER */
  .pr-banner {
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(139,92,246,0.1));
    border: 1px solid rgba(255,215,0,0.25); border-radius: 12px;
    padding: 10px 14px; margin-bottom: 8px; animation: prPop 0.4s cubic-bezier(.34,1.56,.64,1);
    cursor: pointer; transition: 0.15s;
  }
  .pr-banner:active { transform: scale(0.97); }
  .pr-banner .pr-tap { font-size: 10px; color: rgba(255,215,0,0.4); margin-left: auto; }
  @keyframes prPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .pr-icon { font-size: 22px; }
  .pr-text { font-size: 12px; font-weight: 800; color: #FFD700; }
  .pr-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }

  /* PR CELEBRATION MODAL */
  .pr-celebrate-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 300;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease; cursor: pointer;
  }
  .pr-celebrate-overlay.hidden { display: none; }
  .pr-celebrate-gif {
    width: 280px; height: 280px; border-radius: 20px; overflow: hidden;
    margin-bottom: 20px; background: #111;
    box-shadow: 0 0 60px rgba(255,215,0,0.2);
    animation: prCelebrateIn 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  .pr-celebrate-gif img { width: 100%; height: 100%; object-fit: cover; }
  @keyframes prCelebrateIn { from { transform: scale(0.5) rotate(-5deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
  .pr-celebrate-title {
    font-size: 28px; font-weight: 800; color: #FFD700; text-align: center;
    text-shadow: 0 0 30px rgba(255,215,0,0.4); letter-spacing: 1px;
    animation: prCelebrateIn 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  .pr-celebrate-detail {
    font-size: 14px; color: var(--text2); text-align: center; margin-top: 8px;
    animation: prCelebrateIn 0.7s cubic-bezier(.34,1.56,.64,1);
  }
  .pr-celebrate-close {
    font-size: 12px; color: var(--text3); margin-top: 24px;
    animation: prCelebrateIn 0.8s cubic-bezier(.34,1.56,.64,1);
  }
  .pr-confetti {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 301;
  }

  /* SUGGESTION TAG */
  .suggestion-tag {
    display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 7px;
    border-radius: 4px; letter-spacing: 0.5px; margin-bottom: 4px;
    background: rgba(26,158,143,0.15); color: var(--green);
  }

  /* TOAST PR variant */
  .toast.pr { background: #FFD700; color: #000; }

  /* REST TIMER */
  .rest-timer {
    position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
    width: calc(100% - 28px); max-width: 452px; z-index: 90;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 16px; display: none;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
  }
  .rest-timer.active { display: flex; align-items: center; gap: 12px; }
  .rest-timer-time {
    font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums;
    min-width: 70px;
  }
  .rest-timer-bar { flex: 1; height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
  .rest-timer-fill { height: 100%; border-radius: 3px; transition: width 1s linear; }
  .rest-timer-label { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .rest-timer-btns { display: flex; gap: 6px; }
  .rest-timer-btn {
    width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    font-family: inherit;
  }
  .rest-timer-skip { background: var(--card2); color: var(--text3); }
  .rest-timer-skip:active { background: var(--border); }

  /* SESSION TIMER */
  .session-bar {
    display: none; position: sticky; top: 0; z-index: 80;
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 8px 14px; align-items: center; gap: 10px;
  }
  .session-bar.active { display: flex; }
  .session-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--red);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .session-time {
    font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text);
  }
  .session-label { font-size: 11px; color: var(--text3); flex: 1; }
  .session-stop {
    padding: 5px 12px; border-radius: 8px; border: none;
    background: rgba(194,59,59,0.15); color: var(--red);
    font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .session-stop:active { opacity: 0.7; }

  /* CYCLING MODAL */
  .velo-btn {

  /* Weight input modal */
  .weight-banner {

    -webkit-appearance: none; -moz-appearance: textfield;
  }

</style>

<div class="modal-overlay hidden" id="import-modal">

    <button class="modal-cancel" onclick="closeImportModal()">Annuler</button>
  </div>
</div>

<!-- SESSION TIMER BAR -->
<div class="session-bar" id="session-bar">
  <div class="session-dot"></div>
  <div class="session-time" id="session-time">00:00</div>

  <button class="session-stop" onclick="stopSession();showToast('Séance arrêtée')">Arrêter</button>
</div>

<!-- CYCLING MODAL -->
<div class="modal-overlay hidden" id="velo-modal" onclick="if(event.target===this)closeVeloModal()">

      </div>

      <div class="velo-field">

// ============ INDEXEDDB STORAGE ============
const DB_NAME = 'tracker-muscu-db';
const DB_VERSION = 1;
const STORE_NAME = 'state';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (db) { resolve(db); return; }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        d.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

async function idbGet(key) {
  const d = await openDB();
  return new Promise((resolve, reject) => {
    const tx = d.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSet(key, value) {
  const d = await openDB();
  return new Promise((resolve, reject) => {
    const tx = d.transaction(STORE_NAME, 'readwrite');
    const req = tx.objectStore(STORE_NAME).put(value, key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// Migrate localStorage → IndexedDB on first run
async function migrateFromLocalStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      await idbSet(STORAGE_KEY, saved);
      localStorage.removeItem(STORAGE_KEY);
      console.log('Migration localStorage → IndexedDB OK');
    }
  } catch(e) {}
}

async function loadState() {
  await migrateFromLocalStorage();
  try {
    const saved = await idbGet(STORAGE_KEY);
    if (saved) Object.assign(state, saved);
  } catch(e) {
    // Fallback localStorage si IndexedDB indispo
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) Object.assign(state, JSON.parse(raw));
    } catch(e2) {}
  }
  if (!state.current) state.current = {};
  if (!state.history) state.history = [];
  if (!state.bodyStats) state.bodyStats = [];
  if (!state.veloSessions) state.veloSessions = [];
}

function saveState() {
  const data = {
    bodyWeight: state.bodyWeight,
    current: state.current,
    history: state.history,
    bodyStats: state.bodyStats,
    veloSessions: state.veloSessions,
  };
  // IndexedDB async (non-bloquant)
  idbSet(STORAGE_KEY, data).catch(() => {
    // Fallback localStorage
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  });
}

// ============ HELPERS ============
function calc1RM(kg, reps) {
  if (!kg || !reps || kg <= 0 || reps <= 0) return 0;
  if (reps === 1) return kg;
  return kg * (1 + reps / 30); // Epley
}

function getRankIdx(ratio, thresholds) {
  let idx = -1;
  for (let i = 0; i < thresholds.length; i++) {
    if (ratio >= thresholds[i]) idx = i;
  }
  return idx;
}

function getProgressInRank(ratio, thresholds, rankIdx) {
  if (rankIdx < 0) return ratio / thresholds[0];
  if (rankIdx >= thresholds.length - 1) return 1;
  const low = thresholds[rankIdx];
  const high = thresholds[rankIdx + 1];
  return (ratio - low) / (high - low);
}

function getBest1RM(rankKey) {
  let best = 0;
  state.history.forEach(h => {
    const day = PROGRAM.find(d => d.id === h.dayId);
    if (!day) return;
    day.exercises.forEach(ex => {
      if (ex.rankKey !== rankKey) return;
      for (let i = 0; i < ex.sets; i++) {
        const s = h.sets[`${ex.id}_${i}`];
        if (s) {
          const rm = calc1RM(parseFloat(s.kg), parseInt(s.reps));
          if (rm > best) best = rm;
        }
      }
    });
  });
  return best;
}

function getLastPerf(exId, setIdx) {
  for (let i = state.history.length - 1; i >= 0; i--) {
    const s = state.history[i].sets[`${exId}_${setIdx}`];
    if (s) return s;
  }
  return null;
}

function getTopSetHistory(exId) {
  return state.history
    .filter(h => h.sets[`${exId}_0`])
    .map(h => ({
      date: new Date(h.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}),
      kg: parseFloat(h.sets[`${exId}_0`].kg)||0,
      reps: parseInt(h.sets[`${exId}_0`].reps)||0,
    }))
    .slice(-12);
}

// ---- PR DETECTION ----
// Returns best kg for a given exercise+set across all history BEFORE a given entry index
function getBestKgBefore(exId, setIdx, beforeIdx) {
  let best = 0;
  for (let i = 0; i < beforeIdx; i++) {
    const s = state.history[i].sets[`${exId}_${setIdx}`];
    if (s) { const kg = parseFloat(s.kg)||0; if (kg > best) best = kg; }
  }
  return best;
}

function getBestRmBefore(exId, setIdx, beforeIdx) {
  let best = 0;
  for (let i = 0; i < beforeIdx; i++) {
    const s = state.history[i].sets[`${exId}_${setIdx}`];
    if (s) { const rm = calc1RM(parseFloat(s.kg)||0, parseInt(s.reps)||0); if (rm > best) best = rm; }
  }
  return best;
}

// Returns list of PR strings for a freshly pushed entry (last in history)
function detectPRs(entry, day) {
  const idx = state.history.length - 1;
  const prs = [];
  day.exercises.forEach(ex => {
    for (let i = 0; i < ex.sets; i++) {
      const s = entry.sets[`${ex.id}_${i}`];
      if (!s) continue;
      const kg = parseFloat(s.kg)||0;
      const reps = parseInt(s.reps)||0;
      if (!kg) continue;
      const prevBestKg = getBestKgBefore(ex.id, i, idx);
      if (prevBestKg > 0 && kg > prevBestKg) {
        const label = ex.topSet && i === 0 ? 'Top Set' : `S${i+1}`;
        prs.push(`${ex.name.split(' ').slice(0,2).join(' ')} ${label}: ${kg}kg (+${(kg-prevBestKg).toFixed(1)}kg)`);
      }
    }
  });
  return prs;
}

// ---- SUGGESTIONS ----
// Parse upper bound of rep range from format string e.g. "3×6-8" → 8, "3×10-12" → 12
function parseUpperReps(format) {
  const m = format.match(/(\d+)-(\d+)/);
  return m ? parseInt(m[2]) : null;
}

// For each exercise in a day, check if last session hit upper rep range on all sets → suggest +2.5kg
function getSuggestions(day) {
  const suggestions = {};
  day.exercises.forEach(ex => {
    const upper = parseUpperReps(ex.format);
    if (!upper) return;
    let allHit = false;
    let anyData = false;
    for (let i = 0; i < ex.sets; i++) {
      const last = getLastPerf(ex.id, i);
      if (!last) { allHit = false; break; }
      anyData = true;
      const reps = parseInt(last.reps)||0;
      if (reps < upper) { allHit = false; break; }
      allHit = true;
    }
    if (anyData && allHit) {
      const lastKg = parseFloat(getLastPerf(ex.id, 0).kg)||0;
      suggestions[ex.id] = lastKg + 2.5;
    }
  });
  return suggestions;
}

// ---- STREAK ----
function getWeekKey(date) {
  const d = new Date(date);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return d.toISOString().slice(0, 10);
}

function computeStreak() {
  if (!state.history.length) return 0;
  const weeks = new Set(state.history.map(h => getWeekKey(h.date)));
  const sorted = [...weeks].sort().reverse();
  const thisWeek = getWeekKey(new Date());
  const lastWeek = getWeekKey(new Date(Date.now() - 7*24*3600*1000));
  if (sorted[0] !== thisWeek && sorted[0] !== lastWeek) return 0;
  let streak = 0;
  let cursor = new Date(sorted[0]);
  for (const w of sorted) {
    if (w === getWeekKey(cursor)) { streak++; cursor = new Date(cursor.getTime() - 7*24*3600*1000); }
    else break;
  }
  return streak;
}


function formatDate(iso) {
  return new Date(iso).toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long'});
}

    card.addEventListener('touchmove', e => {

  });

// ---- REST TIMER ----
let restTimerInterval = null;
let restTimerEnd = 0;
let restTimerDuration = 0;

function getRestDuration(exId) {
  for (const day of PROGRAM) {
    for (const ex of day.exercises) {
      if (ex.id === exId) {
        if (ex.topSet) return 180; // 3 min
        if (ex.superset) return 90; // 1:30
        if (ex.dropSet) return 90;
        // Check format for rep range hints
        const f = ex.format;
        if (f.includes('6-8') || f.includes('6-10')) return 150; // 2:30
        if (f.includes('8-10') || f.includes('10-12')) return 120; // 2 min
        return 90; // 1:30 default for isolation
      }
    }
  }
  return 120;
}

function onSetInput(exId, setIdx, kgKey, repsKey, isTopSet, rankKey) {
  // Start session timer on first input
  if (!state._sessionActive) startSession();

  // Check if both kg and reps are filled for this set
  const kg = state.current[kgKey];
  const reps = state.current[repsKey];
  if (kg && reps && parseFloat(kg) > 0 && parseInt(reps) > 0) {
    // Start rest timer
    const duration = getRestDuration(exId);
    startRestTimer(duration, exId);
  }

  // Live 1RM update (without re-render to keep focus)
  if (isTopSet && setIdx === 0 && rankKey) {
    const el = document.getElementById('live1rm-' + exId);
    if (el) {
      const k = parseFloat(state.current[kgKey]) || 0;
      const r = parseInt(state.current[repsKey]) || 0;
      if (k > 0 && r > 0) {
        const rm = calc1RM(k, r);
        const bw = state.bodyWeight || 95;
        const ratio = rm / bw;
        const rk = getRankIdx(ratio, STANDARDS[rankKey].thresholds);
        const rkObj = rk >= 0 ? RANKS[rk] : null;
        el.innerHTML = `<span class="live-1rm ${rkObj?rkObj.cls:''}" style="background:${rkObj?'rgba(255,255,255,0.06)':'transparent'};color:var(--text2)">
          1RM: ${rm.toFixed(1)}kg · ${ratio.toFixed(2)}×BW ${rkObj ? rkObj.icon+' '+rkObj.name : ''}
        </span>`;
      } else {
        el.innerHTML = '';
      }
    }
  }
}

function startRestTimer(duration, exId) {
  // Don't restart if already running for same duration
  if (restTimerInterval) clearInterval(restTimerInterval);

  restTimerDuration = duration;
  restTimerEnd = Date.now() + duration * 1000;

  const el = document.getElementById('rest-timer');
  const timeEl = document.getElementById('rest-timer-time');
  const fillEl = document.getElementById('rest-timer-fill');
  const labelEl = document.getElementById('rest-timer-label');
  const day = PROGRAM[state.dayIdx];

  el.classList.add('active');
  fillEl.style.background = day ? day.accent : 'var(--blue)';
  labelEl.textContent = `Repos — ${Math.floor(duration/60)}:${(duration%60).toString().padStart(2,'0')}`;

  restTimerInterval = setInterval(() => {
    const remaining = Math.max(0, Math.ceil((restTimerEnd - Date.now()) / 1000));
    const min = Math.floor(remaining / 60);
    const sec = remaining % 60;
    timeEl.textContent = `${min}:${sec.toString().padStart(2,'0')}`;
    timeEl.style.color = remaining <= 5 ? 'var(--green)' : 'var(--text)';

    const pct = ((duration - remaining) / duration) * 100;
    fillEl.style.width = pct + '%';

    if (remaining <= 0) {
      clearInterval(restTimerInterval);
      restTimerInterval = null;
      timeEl.textContent = 'GO !';
      timeEl.style.color = 'var(--green)';
      fillEl.style.width = '100%';
      // Vibrate if available
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      // Auto-hide after 3s
      setTimeout(() => {
        el.classList.remove('active');
      }, 3000);
    }
  }, 250);
}

function skipRestTimer() {
  if (restTimerInterval) clearInterval(restTimerInterval);
  restTimerInterval = null;
  document.getElementById('rest-timer').classList.remove('active');
}

// ---- SESSION TIMER ----
let sessionInterval = null;
let sessionStart = 0;
let wakeLock = null;

function startSession() {
  if (state._sessionActive) return;
  state._sessionActive = true;
  sessionStart = Date.now();

  document.getElementById('session-bar').classList.add('active');

  sessionInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    const min = Math.floor(elapsed / 60);
    const sec = elapsed % 60;
    document.getElementById('session-time').textContent =
      `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  }, 1000);

  // Request wake lock
  requestWakeLock();
}

function stopSession() {
  state._sessionActive = false;
  if (sessionInterval) clearInterval(sessionInterval);
  sessionInterval = null;
  document.getElementById('session-bar').classList.remove('active');
  releaseWakeLock();
}

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch(e) { console.log('Wake Lock non disponible'); }
}

function releaseWakeLock() {
  if (wakeLock) {
    wakeLock.release();
    wakeLock = null;
  }
}

// Re-acquire wake lock when page becomes visible again
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state._sessionActive) {
    requestWakeLock();
  }
});

function finishSession(dayId) {
  const day = PROGRAM.find(d => d.id === dayId);
  const entry = { dayId, date: new Date().toISOString(), sets: {} };
  let hasData = false;

  day.exercises.forEach(ex => {
    for (let i = 0; i < ex.sets; i++) {
      const kg = state.current[`${ex.id}_${i}_kg`];
      const reps = state.current[`${ex.id}_${i}_reps`];
      if (kg || reps) {
        entry.sets[`${ex.id}_${i}`] = { kg: kg||'0', reps: reps||'0' };
        hasData = true;
      }
    }
  });

  if (!hasData) { showToast('Saisis au moins une série !'); return; }

  // Stop timers
  stopSession();
  skipRestTimer();

  // Clear current
  day.exercises.forEach(ex => {
    for (let i = 0; i < ex.sets; i++) {
      delete state.current[`${ex.id}_${i}_kg`];
      delete state.current[`${ex.id}_${i}_reps`];
    }
  });

  state.history.push(entry);
  state.activeEx = null;

  // Detect PRs before saving
  const prs = detectPRs(entry, day);

  saveState();

  if (prs.length) {
    state._lastPRs = prs;
    showToast(`🏆 ${prs.length} PR${prs.length>1?'s':''} battu${prs.length>1?'s':''}  !`, 'pr');
  } else {
    showToast('Séance enregistrée ! 💪');
  }
  render();
}

// ---- RANK ----
function renderRank() {
  let html = '';

  // Weight banner
  html += `<div class="weight-banner">
    <span style="font-size:14px;font-weight:700;color:#000">Poids actuel</span>
    <input type="number" inputmode="decimal" value="${state.bodyWeight||''}" placeholder="kg"
      onchange="updateWeight(this.value)">
    <span style="font-size:13px;color:rgba(0,0,0,0.6);font-weight:600">kg</span>
  </div>`;

  const bw = state.bodyWeight || 95;
  let totalRankIdx = 0;
  let rankCount = 0;

  // Per-exercise rank
  Object.keys(STANDARDS).forEach(key => {
    const std = STANDARDS[key];
    const best1RM = getBest1RM(key);
    const ratio = bw > 0 ? best1RM / bw : 0;
    const rankIdx = getRankIdx(ratio, std.thresholds);
    const progress = getProgressInRank(ratio, std.thresholds, rankIdx);
    const rank = rankIdx >= 0 ? RANKS[rankIdx] : null;
    const nextRank = rankIdx < RANKS.length - 1 ? RANKS[rankIdx + 1] : null;
    const nextThreshold = rankIdx < std.thresholds.length - 1 ? std.thresholds[rankIdx + 1] : null;
    const nextKg = nextThreshold ? (nextThreshold * bw).toFixed(1) : null;

    if (rankIdx >= 0) { totalRankIdx += rankIdx; rankCount++; }

    html += `<div class="rank-card ${rank?rank.cls:'rank-bronze'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--text)">${std.name}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">1RM estimé: <strong style="color:var(--text)">${best1RM>0?best1RM.toFixed(1)+'kg':'—'}</strong> · Ratio: <strong style="color:var(--text)">${ratio>0?ratio.toFixed(2)+'×BW':'—'}</strong></div>
        </div>
        ${rank ? `<div class="rank-badge">${rank.icon} ${rank.name}</div>` : '<div class="rank-badge" style="background:rgba(255,255,255,0.05);color:#555">Non classé</div>'}
      </div>
      <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${Math.min(Math.max(progress*100,2),100)}%"></div></div>
      ${nextRank && nextKg ? `<div style="font-size:10px;color:var(--text3)">Prochain: ${nextRank.icon} ${nextRank.name} → ${nextKg}kg (${(nextThreshold).toFixed(2)}×BW)</div>` : ''}
    </div>`;
  });

  // Overall rank
  const overallIdx = rankCount > 0 ? Math.floor(totalRankIdx / rankCount) : -1;
  const overallRank = overallIdx >= 0 ? RANKS[overallIdx] : null;

  if (overallRank) {
    const overallHtml = `<div class="overall-rank ${overallRank.cls}">
      <div class="rank-icon">${overallRank.icon}</div>
      <div class="rank-name" style="color:var(--rc)">${overallRank.name}</div>
      <div class="rank-sub">Rang global — moyenne de tes 3 lifts</div>
    </div>`;
    html = overallHtml + html;
  } else {
    html = `<div class="overall-rank rank-bronze">
      <div class="rank-icon">🎯</div>
      <div class="rank-name" style="color:var(--text3)">Non classé</div>
      <div class="rank-sub">Termine quelques séances pour débloquer ton rang</div>
    </div>` + html;
  }

  // Rank legend
  html += `<div class="card" style="margin-top:14px">
    <div style="font-size:13px;font-weight:700;color:var(--yellow);margin-bottom:10px">Échelle des rangs — Bench (ratio 1RM/BW)</div>
    <div style="display:flex;flex-direction:column;gap:4px">`;
  RANKS.forEach((r, i) => {
    html += `<div style="display:flex;align-items:center;gap:8px;font-size:12px">
      <span style="width:24px;text-align:center">${r.icon}</span>
      <span style="width:80px;font-weight:600;color:var(--text)">${r.name}</span>
      <span style="color:var(--text3)">${STANDARDS.bench.thresholds[i]}× BW → ${(STANDARDS.bench.thresholds[i]*bw).toFixed(0)}kg</span>
    </div>`;
  });
  html += '</div></div>';

  // Methodology
  html += `<div class="card" style="margin-top:8px">
    <div style="font-size:12px;color:var(--text3);line-height:1.6">
      <strong style="color:var(--text2)">Méthode :</strong> Le 1RM est estimé via la formule d'Epley (charge × (1 + reps/30)). Le ratio 1RM/poids de corps est comparé à des standards de force reconnus, adaptés par exercice. Le rang global est la moyenne de tes 3 top sets.
    </div>
  </div>`;

  document.getElementById('page-rank').innerHTML = html;
}

  render();

// ---- PROGRESS ----
function renderProgress() {
  let html = '<h2 class="page-title">Progression des top sets</h2>';

  // Streak card
  const streak = computeStreak();
  const streakColor = streak >= 8 ? 'var(--red)' : streak >= 4 ? 'var(--yellow)' : 'var(--purple)';
  const flames = streak >= 8 ? '🔥🔥🔥' : streak >= 4 ? '🔥🔥' : streak >= 2 ? '🔥' : '⬜';
  html += `<div class="card" style="margin-bottom:14px;display:flex;align-items:center;gap:14px">
    <div style="font-size:40px;font-weight:800;color:${streakColor};line-height:1">${streak}</div>
    <div>
      <div style="font-size:13px;font-weight:700;color:var(--text)">${flames} Semaine${streak!==1?'s':''} de streak</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${streak===0?'Commence ta première séance !':streak===1?'Premier pas, continue !':'Belle régularité, continue !'}</div>
    </div>
  </div>`;

  // ---- HEATMAP CALENDAR ----
  html += renderHeatmap();

  const topExercises = PROGRAM.flatMap(d => d.exercises.filter(e => e.topSet).map(e => ({...e, accent: d.accent})));

  topExercises.forEach(ex => {
    const data = getTopSetHistory(ex.id);
    const maxKg = data.length ? Math.max(...data.map(d=>d.kg)) : 0;

    html += `<div class="card" style="margin-bottom:10px">
      <div style="font-size:13px;font-weight:700;color:${ex.accent};margin-bottom:8px">${ex.name}</div>`;

    if (!data.length) {
      html += '<div style="font-size:12px;color:var(--text3);padding:8px 0">Aucune donnée encore</div>';
    } else {
      // Chart
      html += '<div class="chart-container">';
      data.forEach(d => {
        const h = maxKg > 0 ? Math.max((d.kg/maxKg)*65, 4) : 4;
        html += `<div class="chart-bar" style="height:${h}px;background:linear-gradient(to top,${ex.accent},${ex.accent}80)">
          <span class="chart-val">${d.kg}</span></div>`;
      });
      html += '</div><div class="chart-labels">';
      data.forEach(d => { html += `<span>${d.date}</span>`; });
      html += '</div>';

      // Summary
      if (data.length > 1) {
        const diff = data[data.length-1].kg - data[0].kg;
        const col = diff >= 0 ? 'var(--green)' : 'var(--red)';
        html += `<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px">
          <span style="color:var(--text3)">Départ: <strong style="color:var(--text2)">${data[0].kg}kg</strong></span>
          <span style="color:var(--text3)">Actuel: <strong style="color:${ex.accent}">${data[data.length-1].kg}kg</strong></span>
          <span style="color:${col};font-weight:700">${diff>=0?'+':''}${diff.toFixed(1)}kg</span>
        </div>`;
      }
    }
    html += '</div>';
  });

  // Session counts
  html += '<h2 class="page-title" style="margin-top:20px">Volume d\'entraînement</h2>';
  PROGRAM.forEach(d => {
    const count = state.history.filter(h => h.dayId === d.id).length;
    html += `<div class="card" style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;font-weight:600;color:${d.accent}">${d.name}</span>
        <span style="font-size:20px;font-weight:800;color:${d.accent}">${count}</span>
      </div>
      <div style="font-size:11px;color:var(--text3)">séances complétées</div>
    </div>`;
  });

  // Vélo stats
  if (state.veloSessions && state.veloSessions.length) {
    const totalKm = state.veloSessions.reduce((a, v) => a + (v.distance || 0), 0);
    const totalMin = state.veloSessions.reduce((a, v) => a + (v.duration || 0), 0);
    const totalH = Math.floor(totalMin / 60);
    const remMin = totalMin % 60;
    html += `<div class="card" style="margin-bottom:6px;border-left:3px solid var(--yellow)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;font-weight:600;color:var(--yellow)">🚴 Vélo</span>
        <span style="font-size:20px;font-weight:800;color:var(--yellow)">${state.veloSessions.length}</span>
      </div>

    </div>`;
  }

  document.getElementById('page-progress').innerHTML = html;
}

// ---- EDIT SESSION ----
let editingIdx = null;
let editSets = {};

function openEditSession(idx) {
  editingIdx = idx;
  const h = state.history[idx];
  const d = PROGRAM.find(p => p.id === h.dayId);
  if (!d) return;
  editSets = JSON.parse(JSON.stringify(h.sets)); // deep copy

  document.getElementById('edit-modal-title').textContent = `Modifier — ${d.name} · ${formatDate(h.date)}`;

  let body = '';
  d.exercises.forEach(ex => {
    body += `<div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:${d.accent};margin-bottom:6px">${ex.name}</div>`;
    for (let i = 0; i < ex.sets; i++) {
      const key = `${ex.id}_${i}`;
      const s = editSets[key] || {kg:'', reps:''};
      const isTop = ex.topSet && i === 0;
      body += `<div class="set-row">
        <div class="set-label${isTop?' top':''}" style="--ex-accent:${d.accent}">${isTop?'TOP':`S${i+1}`}</div>
        <div class="input-wrap">
          <input type="number" inputmode="decimal" placeholder="kg" value="${s.kg||''}"
            oninput="updateEditSet('${key}','kg',this.value)">
          <span class="unit">kg</span>
        </div>
        <div class="input-wrap">
          <input type="number" inputmode="numeric" placeholder="reps" value="${s.reps||''}"
            oninput="updateEditSet('${key}','reps',this.value)">
          <span class="unit">reps</span>
        </div>
      </div>`;
    }
    body += '</div>';
  });

  document.getElementById('edit-modal-body').innerHTML = body;
  document.getElementById('edit-modal').classList.remove('hidden');
}

function updateEditSet(key, field, val) {
  if (!editSets[key]) editSets[key] = {kg:'', reps:''};
  editSets[key][field] = val;
  // Remove entry if both empty
  if (!editSets[key].kg && !editSets[key].reps) delete editSets[key];
}

function saveEditSession() {
  if (editingIdx === null) return;
  state.history[editingIdx].sets = editSets;
  saveState();
  closeEditModal();
  showToast('Séance modifiée ✓');
  render();
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.add('hidden');
  editingIdx = null;
  editSets = {};
}

// ---- DELETE SESSION ----
function deleteSession(idx) {
  const h = state.history[idx];
  const d = PROGRAM.find(p => p.id === h.dayId);
  const label = d ? `${d.name} du ${formatDate(h.date)}` : 'cette séance';
  if (confirm(`Supprimer ${label} ? Cette action est irréversible.`)) {
    state.history.splice(idx, 1);
    saveState();
    showToast('Séance supprimée');
    render();
  }
}

function deleteVeloSession(idx) {
  const v = state.veloSessions[idx];
  const label = v ? `sortie vélo du ${formatDate(v.date)}` : 'cette sortie';
  if (confirm(`Supprimer ${label} ?`)) {
    state.veloSessions.splice(idx, 1);
    saveState();
    showToast('Sortie vélo supprimée');
    render();
  }
}

// ---- EXPORT EXCEL ----
function exportToExcel() {
  if (typeof XLSX === 'undefined') { showToast('Export indisponible'); return; }

  const wb = XLSX.utils.book_new();

  // Sheet 1: Séances
  const rows1 = [['Date', 'Jour', 'Programme', 'Exercice', 'Série', 'Charge (kg)', 'Répétitions', '1RM estimé (kg)']];
  state.history.forEach(h => {
    const d = PROGRAM.find(p => p.id === h.dayId);
    if (!d) return;
    const dateStr = new Date(h.date).toLocaleDateString('fr-FR');
    d.exercises.forEach(ex => {
      for (let i = 0; i < ex.sets; i++) {
        const s = h.sets[`${ex.id}_${i}`];
        if (!s) continue;
        const kg = parseFloat(s.kg) || 0;
        const reps = parseInt(s.reps) || 0;
        const rm = kg > 0 && reps > 0 ? +(calc1RM(kg, reps).toFixed(1)) : '';
        const label = ex.topSet && i === 0 ? 'TOP SET' : `Série ${i+1}`;
        rows1.push([dateStr, d.name, d.subtitle, ex.name, label, kg||'', reps||'', rm]);
      }
    });
  });
  const ws1 = XLSX.utils.aoa_to_sheet(rows1);
  ws1['!cols'] = [14,10,20,30,10,12,13,16].map(w => ({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws1, 'Séances');

  // Sheet 2: Top Sets progression
  const topExercises = PROGRAM.flatMap(d => d.exercises.filter(e => e.topSet).map(e => ({...e, dayName: d.name})));
  const rows2 = [['Exercice', 'Jour', 'Date', 'Charge (kg)', 'Répétitions', '1RM estimé (kg)']];
  topExercises.forEach(ex => {
    const hist = getTopSetHistory(ex.id);
    // Need full dates, re-fetch
    state.history.forEach(h => {
      const s = h.sets[`${ex.id}_0`];
      if (!s) return;
      const kg = parseFloat(s.kg) || 0;
      const reps = parseInt(s.reps) || 0;
      const rm = kg > 0 && reps > 0 ? +(calc1RM(kg, reps).toFixed(1)) : '';
      rows2.push([ex.name, ex.dayName, new Date(h.date).toLocaleDateString('fr-FR'), kg||'', reps||'', rm]);
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet(rows2);
  ws2['!cols'] = [30,10,14,12,13,16].map(w => ({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws2, 'Top Sets');

  // Sheet 3: Mesures corporelles
  const rows3 = [['Date', 'Poids (kg)', 'Bras (cm)', 'Poitrine (cm)', 'Taille (cm)']];
  state.bodyStats.forEach(b => {
    rows3.push([
      new Date(b.date).toLocaleDateString('fr-FR'),
      parseFloat(b.poids)||'', parseFloat(b.bras)||'',
      parseFloat(b.poitrine)||'', parseFloat(b.taille_cm)||''
    ]);
  });
  const ws3 = XLSX.utils.aoa_to_sheet(rows3);
  ws3['!cols'] = [14,12,12,14,12].map(w => ({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws3, 'Mesures corporelles');

  const filename = `tracker-muscu-${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb, filename);
  showToast('Export Excel téléchargé 📊');
}

  document.getElementById('pr-celebrate').classList.add('hidden');

function launchConfetti() {
  const canvas = document.getElementById('pr-confetti');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#A78BFA', '#F97316', '#06B6D4', '#DC2626', '#34D399'];
  const particles = [];

  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.5,
      w: 4 + Math.random() * 6,
      h: 8 + Math.random() * 10,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 12,
      opacity: 1,
    });
  }

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;

    particles.forEach(p => {
      if (p.opacity <= 0) return;
      alive = true;
      p.x += p.vx;
      p.vy += 0.08;
      p.y += p.vy;
      p.rot += p.rotSpeed;
      if (frame > 60) p.opacity -= 0.008;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });

    frame++;
    if (alive && frame < 300 && !document.getElementById('pr-celebrate').classList.contains('hidden')) {
      requestAnimationFrame(animate);
    }
  }
  requestAnimationFrame(animate);
}

// Init swipe-to-close once at startup
(function initSwipeToClose() {
  const panel = document.getElementById('swipe-panel');
  let startX = 0, startY = 0, isDragging = false;

  panel.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true;
    panel.style.transition = 'none';
  }, { passive: true });

  panel.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = Math.abs(e.touches[0].clientY - startY);
    if (dy > 30 && Math.abs(dx) < dy) return;
    if (dx > 0) {
      panel.style.transform = `translateX(${dx}px)`;
      const progress = Math.min(dx / panel.offsetWidth, 1);
      document.getElementById('swipe-overlay').style.background =
        `rgba(0,0,0,${0.6 * (1 - progress)})`;
    }
  }, { passive: true });

  panel.addEventListener('touchend', (e) => {
    if (!isDragging) return;
    isDragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    panel.style.transition = '';
    if (dx > panel.offsetWidth * 0.35) {
      closeInfoModal();
    } else {
      panel.style.transform = 'translateX(0)';
      document.getElementById('swipe-overlay').style.background = '';
    }
  }, { passive: true });
})();

// ---- IMPORT EXCEL ----
let importParsedSessions = [];

function openImportModal() {
  importParsedSessions = [];
  document.getElementById('import-preview').style.display = 'none';
  document.getElementById('import-confirm-btn').style.display = 'none';
  document.getElementById('import-file-input').value = '';
  document.getElementById('import-drop-zone').innerHTML = `
    <div class="drop-icon">📂</div>
    <div class="drop-title">Sélectionner un fichier Excel</div>
    <div class="drop-sub">Ou glisse-dépose ton fichier .xlsx ici</div>`;
  document.getElementById('import-modal').classList.remove('hidden');

  // Drag & drop
  const zone = document.getElementById('import-drop-zone');
  zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('dragover'); };
  zone.ondragleave = () => zone.classList.remove('dragover');
  zone.ondrop = (e) => {
    e.preventDefault(); zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) processImportFile(file);
  };
}

function closeImportModal() {
  document.getElementById('import-modal').classList.add('hidden');
  importParsedSessions = [];
}

function handleImportFile(input) {
  const file = input.files[0];
  if (file) processImportFile(file);
}

function processImportFile(file) {
  if (typeof XLSX === 'undefined') { showToast('Bibliothèque XLSX indisponible'); return; }
  if (!file.name.match(/\.xlsx?$/i)) { showToast('Fichier non supporté — utilise un .xlsx'); return; }

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });

      // Read "Séances" sheet
      const sheetName = wb.SheetNames.find(n => n.toLowerCase().includes('ance') || n.toLowerCase().includes('s\u00e9ance')) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

      // Group rows by date + day name → rebuild history entries
      const sessionMap = {}; // key: "date|dayId"

      rows.forEach(row => {
        // Columns: Date, Jour, Programme, Exercice, Série, Charge (kg), Répétitions
        const dateRaw = row['Date'] || '';
        const jourName = (row['Jour'] || '').trim();
        const exName = (row['Exercice'] || '').trim();
        const setLabel = (row['Série'] || '').trim();
        const kg = row['Charge (kg)'];
        const reps = row['Répétitions'];

        if (!dateRaw || !jourName || !exName || (!kg && !reps)) return;

        // Find day in PROGRAM by name
        const day = PROGRAM.find(d => d.name.toLowerCase() === jourName.toLowerCase());
        if (!day) return;

        // Find exercise
        const ex = day.exercises.find(e => e.name.toLowerCase() === exName.toLowerCase());
        if (!ex) return;

        // Determine set index
        let setIdx = 0;
        if (setLabel === 'TOP SET') setIdx = 0;
        else {
          const m = setLabel.match(/(\d+)/);
          setIdx = m ? parseInt(m[1]) - 1 : 0;
        }

        // Parse date (dd/mm/yyyy or JS Date)
        let isoDate;
        if (dateRaw instanceof Date) {
          isoDate = dateRaw.toISOString();
        } else {
          const parts = String(dateRaw).split('/');
          if (parts.length === 3) {
            isoDate = new Date(`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}T12:00:00`).toISOString();
          } else {
            isoDate = new Date(dateRaw).toISOString();
          }
        }
        if (!isoDate || isoDate === 'Invalid Date') return;

        const key = `${isoDate.slice(0,10)}|${day.id}`;
        if (!sessionMap[key]) {
          sessionMap[key] = { dayId: day.id, date: isoDate, sets: {} };
        }
        const setKey = `${ex.id}_${setIdx}`;
        sessionMap[key].sets[setKey] = { kg: String(kg||'0'), reps: String(reps||'0') };
      });

      importParsedSessions = Object.values(sessionMap);

      if (!importParsedSessions.length) {
        document.getElementById('import-preview').style.display = 'block';
        document.getElementById('import-preview').innerHTML = '⚠️ Aucune séance reconnue dans ce fichier. Vérifie qu\'il s\'agit d\'un export de ce tracker.';
        document.getElementById('import-confirm-btn').style.display = 'none';
        return;
      }

      // Preview
      const existingKeys = new Set(state.history.map(h => `${h.date.slice(0,10)}|${h.dayId}`));
      const newOnes = importParsedSessions.filter(s => !existingKeys.has(`${s.date.slice(0,10)}|${s.dayId}`));
      const dupOnes = importParsedSessions.length - newOnes.length;

      const zone = document.getElementById('import-drop-zone');
      zone.innerHTML = `<div class="drop-icon">✅</div><div class="drop-title" style="color:var(--green)">${file.name}</div><div class="drop-sub">Fichier chargé avec succès</div>`;

      const prev = document.getElementById('import-preview');
      prev.style.display = 'block';
      prev.innerHTML = `<strong>${importParsedSessions.length}</strong> séance${importParsedSessions.length>1?'s':''} trouvée${importParsedSessions.length>1?'s':''} dans le fichier.<br>`
        + (newOnes.length ? `<strong style="color:var(--green)">${newOnes.length} nouvelle${newOnes.length>1?'s':''}</strong> à ajouter.<br>` : '')
        + (dupOnes ? `<span style="color:var(--text3)">${dupOnes} déjà présente${dupOnes>1?'s':''} (ignorée${dupOnes>1?'s':''}).</span>` : '')
        + (newOnes.length === 0 ? '<br><em>Toutes les séances sont déjà dans l\'historique.</em>' : '');

      document.getElementById('import-confirm-btn').style.display = newOnes.length ? 'block' : 'none';

    } catch(err) {
      showToast('Erreur lors de la lecture du fichier');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function confirmImport() {
  if (!importParsedSessions.length) return;
  const existingKeys = new Set(state.history.map(h => `${h.date.slice(0,10)}|${h.dayId}`));
  const toAdd = importParsedSessions.filter(s => !existingKeys.has(`${s.date.slice(0,10)}|${s.dayId}`));
  if (!toAdd.length) { closeImportModal(); return; }

  // Merge & sort by date
  state.history = [...state.history, ...toAdd].sort((a,b) => new Date(a.date) - new Date(b.date));
  saveState();
  closeImportModal();
  showToast(`${toAdd.length} séance${toAdd.length>1?'s':''} importée${toAdd.length>1?'s':''} ✓`);
  render();
}

}


// ---- HEATMAP ----
function renderHeatmap() {
  const today = new Date();
  const weeksToShow = 16;
  const dayColors = { 'A': 'var(--red)', 'B': 'var(--blue)', 'C': 'var(--green)' };
  const veloColor = 'var(--yellow)';

  // Build a map of date -> sessions (muscu)
  const sessionMap = {};
  state.history.forEach(h => {
    const dateKey = h.date.slice(0, 10);
    if (!sessionMap[dateKey]) sessionMap[dateKey] = { muscu: [], velo: false };
    sessionMap[dateKey].muscu.push(h.dayId);
  });

  // Add cycling sessions
  if (state.veloSessions) {
    state.veloSessions.forEach(v => {
      const dateKey = v.date.slice(0, 10);
      if (!sessionMap[dateKey]) sessionMap[dateKey] = { muscu: [], velo: false };
      sessionMap[dateKey].velo = true;
    });
  }

  // Generate weeks (columns) from weeksToShow ago to today
  const startDate = new Date(today);
  startDate.setDate(startDate.getDate() - (weeksToShow * 7) - startDate.getDay() + 1);

  const weeks = [];
  const monthLabels = [];
  let lastMonth = -1;

  for (let w = 0; w < weeksToShow; w++) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      const cellDate = new Date(startDate);
      cellDate.setDate(startDate.getDate() + w * 7 + d);
      const key = cellDate.toISOString().slice(0, 10);
      const data = sessionMap[key] || { muscu: [], velo: false };
      const isFuture = cellDate > today;
      week.push({ date: cellDate, key, ...data, isFuture });

      // Track month labels
      if (d === 0) {
        const m = cellDate.getMonth();
        if (m !== lastMonth) {
          monthLabels.push({ week: w, label: cellDate.toLocaleDateString('fr-FR', { month: 'short' }) });
          lastMonth = m;
        }
      }
    }
    weeks.push(week);
  }

  let html = `<div class="card heatmap">
    <div class="heatmap-title" style="margin-bottom:12px">Activité</div>`;

  // Month labels
  html += '<div class="heatmap-wrap">';
  html += '<div class="heatmap-months">';
  let lastWeekIdx = -1;
  monthLabels.forEach(ml => {
    const offset = ml.week - (lastWeekIdx + 1);
    if (offset > 0) html += `<div style="flex:0 0 ${offset * 17}px"></div>`;
    html += `<div class="heatmap-month" style="flex:0 0 ${17}px">${ml.label}</div>`;
    lastWeekIdx = ml.week;
  });
  html += '</div>';

  // Grid
  html += '<div class="heatmap-grid">';

  // Day labels
  html += '<div class="heatmap-day-labels">';
  ['L','','M','','V','','D'].forEach(l => {
    html += `<div class="heatmap-day-label">${l}</div>`;
  });
  html += '</div>';

  // Weeks
  html += '<div class="heatmap-weeks">';
  weeks.forEach(week => {
    html += '<div class="heatmap-week">';
    week.forEach(cell => {
      let bg = 'var(--border)';
      let border = '';
      if (cell.isFuture) {
        bg = 'transparent';
        border = 'border:1px solid var(--border);';
      } else if (cell.muscu.length > 0 && cell.velo) {
        // Both muscu and velo same day — use a gradient
        const muscuCol = dayColors[cell.muscu[0]] || 'var(--green)';
        bg = `linear-gradient(135deg, ${muscuCol} 50%, ${veloColor} 50%)`;
      } else if (cell.muscu.length >= 2) {
        bg = 'var(--purple)';
      } else if (cell.muscu.length === 1) {
        bg = dayColors[cell.muscu[0]] || 'var(--green)';
      } else if (cell.velo) {
        bg = veloColor;
      }
      const isToday = cell.key === today.toISOString().slice(0, 10);
      const todayBorder = isToday ? 'border:1.5px solid #fff;' : '';
      html += `<div class="heatmap-cell" style="background:${bg};${border}${todayBorder}" title="${cell.key}"></div>`;
    });
    html += '</div>';
  });
  html += '</div></div></div>';

  // Legend inside the card
  html += `<div style="display:flex;gap:10px;align-items:center;justify-content:center;margin-top:12px;font-size:10px;color:var(--text3);flex-wrap:wrap">
    <span>Repos</span><div class="heatmap-cell" style="width:11px;height:11px"></div>
    <span>Jour A</span><div class="heatmap-cell" style="width:11px;height:11px;background:var(--red)"></div>
    <span>Jour B</span><div class="heatmap-cell" style="width:11px;height:11px;background:var(--blue)"></div>
    <span>Jour C</span><div class="heatmap-cell" style="width:11px;height:11px;background:var(--green)"></div>
    <span>Vélo</span><div class="heatmap-cell" style="width:11px;height:11px;background:var(--yellow)"></div>
  </div>`;

  html += '</div>';
  return html;
}
