<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0C0C10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Tracker Muscu">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">

<style>
  /* ── Safe Area iOS — Dynamic Island / Notch ── */

  .page {
    padding-top: env(safe-area-inset-top);
  }

  .nav {
    padding-bottom: env(safe-area-inset-bottom);
  }

  .session-bar {
    top: env(safe-area-inset-top);
  }

  .rest-timer {
    top: calc(env(safe-area-inset-top) + 8px);
  }

  .swipe-panel {
    padding-bottom: env(safe-area-inset-bottom);
  }

  .modal-box {
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
  }

  .pr-celebrate-overlay {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .recap-box {
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
  }
</style>

<title>Tracker Muscu</title>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<div id="toast" class="toast"></div>

<!-- EDIT SESSION MODAL -->
<div class="modal-overlay hidden" id="edit-modal">
  <div class="modal-box">
    <div class="modal-title" id="edit-modal-title">Modifier la séance</div>
    <div id="edit-modal-body"></div>
    <button class="btn-primary" id="edit-modal-save" style="background:var(--blue)" onclick="saveEditSession()">Enregistrer les modifications ✓</button>
    <button class="modal-cancel" onclick="closeEditModal()">Annuler</button>
    <button class="btn-outline" id="edit-modal-delete" style="margin-top:16px;display:none" onclick="">Supprimer</button>
  </div>
</div>

<!-- SWIPE PANEL INFO EXERCICE -->
<div class="swipe-overlay" id="swipe-overlay" onclick="closeInfoModal()"></div>
<div class="swipe-panel" id="swipe-panel">
  <div class="swipe-handle"></div>
  <div class="swipe-panel-header">
    <div class="swipe-panel-title" id="swipe-panel-title"></div>
    <button class="swipe-panel-close" onclick="closeInfoModal()">✕</button>
  </div>
  <div class="swipe-panel-body" id="swipe-panel-body"></div>
</div>

<!-- PR CELEBRATION MODAL -->
<div class="pr-celebrate-overlay hidden" id="pr-celebrate" onclick="closePRCelebrate()">
  <canvas class="pr-confetti" id="pr-confetti"></canvas>
  <div class="pr-celebrate-gif" id="pr-celebrate-gif"></div>
  <div class="pr-celebrate-title" id="pr-celebrate-title"></div>
  <div class="pr-celebrate-detail" id="pr-celebrate-detail"></div>
  <div class="pr-celebrate-close">Touche pour fermer</div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-overlay hidden" id="import-modal">
  <div class="modal-box">
    <div class="modal-title">Charger un fichier Excel</div>
    <div class="import-drop-zone" id="import-drop-zone" onclick="document.getElementById('import-file-input').click()">
      <div class="drop-icon" style="font-size:24px;color:var(--text3)">↓</div>
      <div class="drop-title">Sélectionner un fichier Excel</div>
      <div class="drop-sub">Ou glisse-dépose ton fichier .xlsx ici</div>
    </div>
    <input type="file" id="import-file-input" accept=".xlsx,.xls" style="display:none" onchange="handleImportFile(this)">
    <div class="import-preview" id="import-preview" style="display:none"></div>
    <button class="btn-primary" id="import-confirm-btn" style="background:var(--blue);display:none" onclick="confirmImport()">Importer les séances ✓</button>
    <button class="modal-cancel" onclick="closeImportModal()">Annuler</button>
  </div>
</div>

<!-- WEEKLY RECAP -->
<div class="recap-overlay hidden" id="recap-overlay" onclick="closeRecap()">
  <div class="recap-box" onclick="event.stopPropagation()" id="recap-box"></div>
</div>

<!-- SESSION TIMER BAR -->
<div class="session-bar" id="session-bar">
  <div class="session-dot"></div>
  <div class="session-time" id="session-time">00:00</div>
  <div class="session-label">Séance en cours</div>
  <button class="session-stop" onclick="stopSession();showToast('Séance arrêtée')">Arrêter</button>
</div>

<!-- CYCLING MODAL -->
<div class="modal-overlay hidden" id="velo-modal" onclick="if(event.target===this)closeVeloModal()">
  <div class="modal-box">
    <div class="modal-title">🚴 Ajouter une sortie vélo</div>
    <div class="velo-input-row">
      <div class="velo-field">
        <label>Distance (km)</label>
        <input type="number" inputmode="decimal" id="velo-distance" placeholder="ex: 42">
      </div>
      <div class="velo-field">
        <label>Durée (min)</label>
        <input type="number" inputmode="numeric" id="velo-duration" placeholder="ex: 90">
      </div>
    </div>
    <div class="velo-input-row">
      <div class="velo-field">
        <label>Type de sortie</label>
        <select id="velo-type">
          <option value="endurance">Endurance (30-40 km)</option>
          <option value="long">Sortie longue (100+ km)</option>
          <option value="recup">Récupération active</option>
        </select>
      </div>
    </div>
    <div class="velo-input-row">
      <div class="velo-field">
        <label>Date</label>
        <input type="date" id="velo-date">
      </div>
    </div>
    <button class="btn-primary" style="background:var(--yellow)" onclick="saveVeloSession()">Enregistrer la sortie</button>
    <button class="modal-cancel" onclick="closeVeloModal()">Annuler</button>
  </div>
</div>

<!-- REST TIMER -->
<div class="rest-timer" id="rest-timer">
  <div>
    <div class="rest-timer-time" id="rest-timer-time">0:00</div>
    <div class="rest-timer-label" id="rest-timer-label">Repos</div>
  </div>
  <div style="flex:1">
    <div class="rest-timer-bar"><div class="rest-timer-fill" id="rest-timer-fill"></div></div>
  </div>
  <div class="rest-timer-btns">
    <button class="rest-timer-btn rest-timer-skip" onclick="skipRestTimer()">✕</button>
  </div>
</div>

<!-- NAV -->
<div class="nav" id="nav"></div>

<!-- PAGES -->
<div class="page" id="page-workout"></div>
<div class="page" id="page-rank"></div>
<div class="page" id="page-progress"></div>
<div class="page" id="page-body"></div>
<div class="page" id="page-history"></div>

<!-- APP -->
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
